global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "runtime-kernel"
    static_configs:
      - targets: ["localhost:8001"]

  - job_name: "interceptor"
    static_configs:
      - targets: ["localhost:8002"]

  - job_name: "risk-engine"
    static_configs:
      - targets: ["localhost:8003"]

  - job_name: "sandbox"
    static_configs:
      - targets: ["localhost:8004"]

  - job_name: "verification"
    static_configs:
      - targets: ["localhost:8005"]

  - job_name: "policy"
    static_configs:
      - targets: ["localhost:8006"]

  - job_name: "state"
    static_configs:
      - targets: ["localhost:8007"]
